name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas pyarrow shapely pyproj fastparquet

      - name: Run validator
        run: python bin/validate_v0_3_0.py

      - name: Run mutation test suite
        run: python bin/test_v0_3_0.py
