name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least-privilege: this job only reads the repo and runs validators. Without an
# explicit block it inherits the repo/org default token scope (often read-write).
permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas pyarrow shapely pyproj fastparquet

      - name: Run validator
        run: python bin/validate_v0_3_0.py

      - name: Run mutation test suite
        run: python bin/test_v0_3_0.py
